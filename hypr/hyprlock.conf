# -------------------------------------------------------------------
# General & Background Configuration
# -------------------------------------------------------------------
general {
    # Renkleri ve estetiği korumak için blur'u kapattım (gerçek 5K keskinliği)
}

background {
    monitor =
    # Verdiğin yeni dosya yolu ve adı
    path = /home/fr0sty/wallpapers/saitama-5k-5120x2880-10466.jpg
    color = rgba(200, 30, 32, 1.0) # Arka plan kırmızı rengi (Saitama kırmızısı)
    # Blur'u tamamen kapattım, 1 çok hafif ama kapalı hali daha net.
    blur_passes = 0 
}

# -------------------------------------------------------------------
# Input Box Container (Ana Kutu)
# -------------------------------------------------------------------
# Bu, saat ve input alanını bir arada tutan arka plan kutusu.
# Görseldeki metin renginden esinlendim (hafif kırık beyaz).
shape {
    monitor = eDP-1
    size = 600, 600 # Kutunun genel boyutu
    color = rgba(30, 30, 30, 0.6) # Hafif kırık beyaz / krem, 85% opaklık
    border_color = rgba(180, 180, 180, 0.8)
    border_size = 3
    rounding = 100 # Kenarları yumuşak yuvarlak
    position = 0, -30 # Saitama'nın üzerine gelmesin diye yukarı taşındı
    halign = center
    valign = center
}

# -------------------------------------------------------------------
# Clock Label
# -------------------------------------------------------------------
label {
    monitor = eDP-1
    text = $TIME
    color = rgba(0, 0, 0, 1.0) # Kutu içindeki metin koyu gri/siyah
    font_size = 125 # Kutuya sığacak şekilde küçültüldü
    font_family = Saira # Aradığın o net font!
    position = 5, 130 # Kutunun üst kısmında, merkeze göre
    halign = center
    valign = center
}

label { 
    monitor = eDP-1
    text = $TIME
    color = rgba(255, 255, 255, 1.0) # Kutu içindeki metin koyu gri/siyah
    font_size = 125 # Kutuya sığacak şekilde küçültüldü
    font_family = Saira # Aradığın o net font!
    position = 0, 120 # Kutunun üst kısmında, merkeze göre
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = <small>Welcome Back...</small>
    color = rgba(200, 200, 200, 0.8)
    font_size = 30
    font_family = Saira
    position = 0, -50
    halign = center
    valign = center
}

# -------------------------------------------------------------------
# Input Field (Kutu İçindeki Şifre Alanı)
# -------------------------------------------------------------------
input-field {
    monitor = eDP-1
    size = 300, 60
    outline_thickness = 0 # Kenarlık yok, kutunun içine gömülü duracak
    dots_size = 0.3
    dots_spacing = 0.2
    outer_color = rgba(0,0,0,0) # Kenarlık rengini gizle
    inner_color = rgba(255, 255, 255, 0.6) # Giriş alanının içi biraz daha şeffaf beyaz
    font_color = rgba(10, 10, 10, 1.0) # Şifre karakterleri koyu gri
    fade_on_empty = false
    placeholder_text = <small><i>Password...</i></small> # Daha kişisel bir placeholder
    hide_input = false
    position = 0, -150 # Kutunun alt kısmında, merkeze göre
    halign = center
    valign = center
}
